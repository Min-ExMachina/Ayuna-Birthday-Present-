<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kapsul Waktu 💜</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Great+Vibes&display=swap');

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #fcf9ff;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow-x: hidden; position: relative;
            animation: masukHalaman 0.8s ease forwards;
        }

        @keyframes masukHalaman {
            from { opacity: 0; filter: brightness(2); }
            to { opacity: 1; filter: brightness(1); }
        }
        body.pindah-hal { opacity: 0; transition: opacity 0.8s ease; }

        .wave-top { position: fixed; top: 0; left: 0; width: 100%; z-index: 1; }
        .wave-bottom { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1; transform: rotate(180deg); }

        .btn-kembali {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            background: rgba(139, 92, 246, 0.2); color: #5b21b6;
            border: none; padding: 8px 15px; border-radius: 20px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-kembali:active { transform: scale(0.9); }

        /* --- KOTAK SURAT --- */
        .kontainer-kapsul {
            z-index: 10; width: 90%; max-width: 400px;
            background: white; padding: 30px 20px;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(91, 33, 182, 0.15);
            text-align: center; transition: all 0.5s ease;
        }

        h2 { font-family: 'Great Vibes', cursive; font-size: 2.5rem; color: #5b21b6; margin: 0 0 10px 0; }
        p { color: #6d28d9; font-size: 0.95rem; margin-bottom: 20px; }

        textarea {
            width: 100%; height: 120px;
            padding: 15px; box-sizing: border-box;
            border: 2px solid #eaddff; border-radius: 15px;
            font-family: 'Poppins', sans-serif; font-size: 0.95rem;
            color: #4c1d95; resize: none; outline: none;
            transition: 0.3s;
        }
        textarea:focus { border-color: #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }

        .btn-kirim {
            background: linear-gradient(135deg, #8b5cf6, #5b21b6);
            color: white; padding: 15px 40px; border: none; border-radius: 30px;
            font-size: 1.1rem; font-weight: 600; width: 100%; margin-top: 20px;
            box-shadow: 0 8px 20px rgba(109, 40, 217, 0.3); cursor: pointer; transition: 0.3s;
        }
        .btn-kirim:active { transform: scale(0.95); }

        #layarAkhir {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fcf9ff; z-index: 50;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 1s ease;
        }
        #layarAkhir.tampil { opacity: 1; pointer-events: all; }
        
        #layarAkhir h1 { font-family: 'Great Vibes', cursive; font-size: 3.5rem; color: #5b21b6; margin: 0; text-align: center; line-height: 1.2;}
        #layarAkhir p { font-size: 1.2rem; color: #6d28d9; margin-top: 10px; font-weight: 500; }

        .pagination { display: flex; gap: 10px; position: absolute; bottom: 30px; z-index: 10; }
        .dot { width: 8px; height: 8px; background-color: #d8b4fe; border-radius: 50%; }
        .dot.aktif { background-color: #6d28d9; width: 24px; border-radius: 10px; transition: 0.3s; }
    </style>
</head>
<body>
    <svg class="wave-top" viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg">
        <path fill="#eaddff" fill-opacity="1" d="M0,160L48,144C96,128,192,96,288,106.7C384,117,480,171,576,197.3C672,224,768,224,864,208C960,192,1056,160,1152,133.3C1248,107,1344,85,1392,74.7L1440,64L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
    </svg>

    <div class="kontainer-kapsul" id="formArea">
        <h2>Kapsul Waktu</h2>
        <p>Tuliskan satu pesan atau harapan dede untuk diri dede dan kita di masa depan. Pesan ini akan langsung tersegel dan akan dikirim kepada Dede pada ulang tahun dede, Tahun depan lewat email.</p>
        <textarea id="pesanDede" placeholder="Ketik pesan dede di sini sayang..."></textarea>
        <button class="btn-kirim" id="tombolKirim" onclick="kirimPesan()">Segel Kapsul 💌</button>
    </div>

    <div id="layarAkhir">
        <h1>Terima Kasih,<br>Sayangku!</h1>
        <p>Selamat Ulang Tahun 🥳💜</p>
    </div>

    <div class="pagination" id="pagi">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div> 
        <div class="dot aktif"></div>       
    </div>

    <svg class="wave-bottom" viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg">
        <path fill="#eaddff" fill-opacity="1" d="M0,160L48,170.7C96,181,192,203,288,181.3C384,160,480,96,576,90.7C672,85,768,139,864,160C960,181,1056,171,1152,149.3C1248,128,1344,96,1392,80L1440,64L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
    </svg>

   <script>
        function kirimPesan() {
            const pesan = document.getElementById('pesanDede').value;
            const tombol = document.getElementById('tombolKirim');
            
            if(pesan.trim() === '') {
                alert("Isi dulu ya sayang pesannya 🥰");
                return;
            }

            // Ubah tombol jadi status loading
            tombol.innerText = "Menyegel Kapsul... ⏳";
            tombol.style.background = "#c4b5fd";
            tombol.style.pointerEvents = "none"; // Cegah klik dua kali

            // ALAMAT EMAIL ANDA
            const emailTujuan = "mhmdutsaimin@gmail.com"; 

            // Mengirim data ke FormSubmit di latar belakang
            fetch(`https://formsubmit.co/ajax/${emailTujuan}`, {
                method: "POST",
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    _subject: "✨ Kapsul Waktu Dari Dede ✨",
                    Pesan: pesan
                })
            })
            .then(response => response.json())
            .then(data => {
                // Jika berhasil terkirim, luncurkan layar akhir
                document.getElementById('formArea').style.opacity = '0';
                document.querySelector('.pagination').style.opacity = '0'; 
                
                setTimeout(() => {
                    document.getElementById('layarAkhir').classList.add('tampil');
                }, 500);
            })
            .catch(error => {
                // Jika internet terputus atau gagal
                alert("Yah, koneksi terputus. Coba kirim lagi ya sayang!");
                tombol.innerText = "Segel Kapsul 💌";
                tombol.style.background = "linear-gradient(135deg, #8b5cf6, #5b21b6)";
                tombol.style.pointerEvents = "all";
            });
        }
    </script>
</body>
</html>
